title: AS-REP Roasting Activity
description: Detects AS-REP roasting attempts where accounts have pre-authentication disabled
status: experimental
author: NSO Kryptonite Platform
references:
  - https://attack.mitre.org/techniques/T1558/004/
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4768
    PreAuthType: 0
  filter:
    AccountName|endswith: '$'
  condition: selection and not filter
falsepositives:
  - Accounts legitimately configured without pre-auth (rare)
level: critical
tags:
  - attack.credential_access
  - attack.t1558.004
  - detection_twin.enforced
